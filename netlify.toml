# Netlify Configuration for Next.js App (SSR/ISR + API routes)
# Next.js 16.x + @netlify/plugin-nextjs
#
# CACHING FIX: Stale HTML → old chunk hashes → 404 / MIME text/plain
# ───────────────────────────────────────────────────────────────────
# The Durable Cache problem is solved at three layers:
#   1. proxy.ts      — sets Netlify-CDN-Cache-Control at the app level
#   2. netlify.toml  — sets Netlify-CDN-Cache-Control: no-store for /*
#   3. layout.tsx    — export const dynamic = 'force-dynamic' (prevents prerender)

[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js", "web-push"]
  included_files = ["netlify/functions/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────────────────────
# Security headers (apply to everything)
# ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "no-store"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ─────────────────────────────────────────────────────────────
# Static assets: cache forever (content-hashed, safe to cache)
# ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────────────────────
# PWA assets
# ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

# ─────────────────────────────────────────────────────────────
# Netlify Functions: never cache
# ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ─────────────────────────────────────────────────────────────
# API routes: no cache + CORS
# ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Dev-Token"

[[headers]]
  for = "/api/dev/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private"
