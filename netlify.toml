# Netlify Configuration for Next.js App (SSR/ISR + API routes)
# Next.js 16.x + @netlify/plugin-nextjs

[build]
  command = "npm run build"
  functions = "netlify/functions"
  # IMPORTANT: do NOT set publish when using @netlify/plugin-nextjs

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js", "web-push"]
  included_files = ["netlify/functions/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────────────────────
# Headers
# Goal: prevent stale HTML from being cached at the Netlify edge
# ─────────────────────────────────────────────────────────────

# Default: DO NOT cache HTML at Netlify CDN
[[headers]]
  for = "/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "no-store"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Hashed Next static assets: cache forever (browser cache)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Functions: never cache
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Service Worker: must revalidate
[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API routes: no cache + CORS
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Dev-Token"

[[headers]]
  for = "/api/dev/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private"

# Optional: allow small Netlify edge caching on a few pages
# (override the default no-store above)
[[headers]]
  for = "/"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=60, stale-while-revalidate=300"

[[headers]]
  for = "/faq"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[headers]]
  for = "/terms"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[headers]]
  for = "/privacy-policy"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[headers]]
  for = "/accessibility"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[headers]]
  for = "/products"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[headers]]
  for = "/products/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[headers]]
  for = "/login"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=60, stale-while-revalidate=300"

[[headers]]
  for = "/notifications"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"